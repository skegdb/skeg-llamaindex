name: Release
on:
  push:
    tags: ['v*']

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: tag must be reachable from origin/release
        run: |
          set -e
          if git fetch origin release:refs/remotes/origin/release 2>/dev/null; then
            TARGET_REF="origin/release"
          else
            git fetch origin main:refs/remotes/origin/main
            TARGET_REF="origin/main"
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "$TARGET_REF"; then
            echo "::error::tag ${{ github.ref_name }} (commit $GITHUB_SHA) is not reachable from ${TARGET_REF#origin/}"
            exit 1
          fi
          echo "ok: tag reachable from ${TARGET_REF#origin/}"

  publish:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: twine check
        run: twine check dist/*
      - name: publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --verbose --non-interactive dist/*
